<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Why-opedia — Cause &amp; Effect Graph Encyclopedia</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Toolbar (minimal: just nav controls) -->
  <div id="toolbar">
    <button id="sidebar-toggle" title="Toggle filters panel" aria-expanded="true">☰</button>
    <div id="wordmark">Why<span>-opedia</span></div>
    <button id="fit-btn" title="Reset view">⊡</button>
    <a id="contribute-link" href="https://github.com/bmgcyber/why-opedia/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener">
      + Contribute
    </a>
  </div>

  <!-- Left sidebar -->
  <div id="sidebar">
    <div id="sidebar-inner">

      <!-- 1. Search (full-text: label, aliases, summary, tags) -->
      <div class="sb-section sb-search-section">
        <div class="sb-search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="sb-search" type="text" placeholder="Search nodes, summaries, tags…" autocomplete="off" spellcheck="false" />
        </div>
      </div>
      <!-- Autocomplete is position:fixed, appended to body by JS -->

      <!-- 2. Layout & View toggles (Features N, J, K) -->
      <div class="sb-section">
        <div class="sb-section-header">Layout &amp; View</div>
        <div class="sb-tool-grid">
          <button id="heatmap-btn" class="sb-tool-btn" title="Color nodes by connection count">
            Heat Map
          </button>
          <button id="timeline-btn" class="sb-tool-btn" title="Arrange nodes left-to-right by decade">
            Timeline
          </button>
          <button id="cluster-btn" class="sb-tool-btn" title="Group nodes by category into clusters">
            Cluster
          </button>
        </div>
        <!-- Heat map legend (appears when heat map is on) -->
        <div id="heatmap-legend-inline" class="heatmap-legend-inline" hidden>
          <span class="heatmap-label">Low</span>
          <div class="heatmap-gradient"></div>
          <span class="heatmap-label">High degree</span>
        </div>
      </div>

      <!-- 3. Actions (Features P, T, U) -->
      <div class="sb-section">
        <div class="sb-section-header">Actions</div>
        <div class="sb-tool-grid">
          <button id="export-png-btn" class="sb-tool-btn" title="Download the current graph view as a PNG">
            Export PNG
          </button>
          <button id="analytics-btn" class="sb-tool-btn" title="View graph statistics and charts">
            Analytics
          </button>
          <button id="quiz-btn" class="sb-tool-btn" title="Test your knowledge of the graph">
            Quiz
          </button>
        </div>
      </div>

      <!-- 4. Path Finder (Feature A — collapsed by default) -->
      <div id="sb-pathfinder" class="sb-section">
        <div class="sb-section-header">
          <span>Path Finder</span>
          <button class="sb-collapse-btn" id="pf-collapse" title="Expand">▾</button>
        </div>
        <div id="pf-body">
          <div class="pf-row">
            <span class="pf-row-label">From</span>
            <input id="pf-from" class="pf-input" type="text" placeholder="Start node name…" autocomplete="off" spellcheck="false" />
          </div>
          <div class="pf-row">
            <span class="pf-row-label">To</span>
            <input id="pf-to" class="pf-input" type="text" placeholder="End node name…" autocomplete="off" spellcheck="false" />
          </div>
          <div class="pf-btn-row">
            <button id="pf-find-btn" class="pf-btn primary">Find Path</button>
            <button id="pf-clear-btn" class="pf-btn">Clear</button>
          </div>
          <div id="pf-result" class="pf-result"></div>
        </div>
      </div>

      <!-- 5. Neighborhood Explorer (hidden until node selected) -->
      <div id="sb-neighborhood" class="sb-section" hidden>
        <div class="sb-section-header">
          <span>Neighborhood</span>
        </div>
        <div id="sb-nb-title" class="sb-nb-title"></div>
        <div class="sb-nb-depth-row">
          <span class="sb-label">Depth</span>
          <div class="sb-depth-buttons">
            <button class="sb-depth-btn active" data-depth="1">1</button>
            <button class="sb-depth-btn" data-depth="2">2</button>
            <button class="sb-depth-btn" data-depth="3">3</button>
          </div>
        </div>
        <button id="sb-export-subgraph" class="sb-export-btn">⬇ Export neighborhood JSON</button>
        <button id="sb-nb-clear" class="sb-clear-btn">✕ Clear selection</button>
      </div>

      <!-- 6. Node Type Filters -->
      <div class="sb-section">
        <div class="sb-section-header">Node Types</div>
        <div id="sb-node-types" class="sb-checklist"></div>
      </div>

      <!-- 7. Edge Type Filters -->
      <div class="sb-section">
        <div class="sb-section-header">Edge Types</div>
        <div id="sb-edge-types" class="sb-checklist"></div>
      </div>

      <!-- 8. Region Filter (Feature F — shown only when region data exists) -->
      <div id="sb-region-section" class="sb-section" hidden>
        <div class="sb-section-header">Region</div>
        <div id="sb-regions" class="sb-checklist"></div>
      </div>

      <!-- 9. Connectivity Filter -->
      <div class="sb-section">
        <div class="sb-section-header">
          <span>Connectivity</span>
          <span id="sb-conn-display" class="sb-conn-display">≥ 0</span>
        </div>
        <div class="sb-slider-label">Min connections</div>
        <input id="sb-conn-slider" type="range" min="0" max="50" value="0" class="sb-slider" />
      </div>

      <!-- 10. Reset All -->
      <div class="sb-reset-section">
        <button id="sb-reset" class="sb-reset-btn">Reset All Filters</button>
      </div>

    </div>
  </div>

  <!-- Graph canvas -->
  <div id="cy"></div>

  <!-- Info panel -->
  <div id="info-panel" role="complementary" aria-label="Node detail">
    <button id="panel-close" aria-label="Close panel">✕</button>
    <div id="panel-inner">
      <!-- Populated by app.js -->
    </div>
  </div>

  <!-- Stats -->
  <div id="stats"></div>

  <!-- Layout mode badge (shown when timeline/cluster is active) -->
  <div id="layout-mode-badge" class="layout-mode-badge"></div>

  <!-- Edge legend -->
  <div id="legend">
    <div id="legend-title">Edge types</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#e05252"></div>CAUSED</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#e09752"></div>ENABLED</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#5b8dee"></div>SHARES_MECHANISM_WITH</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#a96ce6"></div>SELF_REINFORCES</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#4a4f6a"></div>other</div>
    <div class="legend-row"><div class="legend-swatch dashed"></div>speculative</div>
  </div>

  <!-- Analytics Modal (Feature T) -->
  <div id="analytics-modal" class="modal-overlay" hidden>
    <div class="modal-content">
      <button class="modal-close" id="analytics-close">✕</button>
      <div class="modal-title">Analytics Dashboard</div>
      <div id="analytics-body"></div>
    </div>
  </div>

  <!-- Quiz Modal (Feature U) -->
  <div id="quiz-modal" class="modal-overlay" hidden>
    <div class="modal-content modal-content-quiz">
      <button class="modal-close" id="quiz-close">✕</button>
      <div class="modal-title">Quiz Mode</div>
      <div id="quiz-body"></div>
    </div>
  </div>

  <!-- Cytoscape.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <!-- fcose layout peer dependencies must load before fcose itself -->
  <script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.min.js"></script>

  <!-- App -->
  <script src="app.js?v=3"></script>
</body>
</html>
